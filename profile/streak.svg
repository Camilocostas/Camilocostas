name: Update streak stats

on:
  schedule:
    - cron: "0 3 * * *"   # se ejecuta todos los días a las 3:00 AM UTC
  push:
    paths:
      - ".github/workflows/streak-stats.yml"
  workflow_dispatch:       # también puedes lanzarlo manualmente desde la pestaña Actions

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate streak stats
        uses: DenverCoder1/github-readme-streak-stats@v1.7.0
        with:
          user_id: Camilocostas
          theme: dark
          path: profile/streak.svg

      - name: Commit streak stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/streak.svg
          git commit -m "Update streak stats" || exit 0
          git push
